version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "00:00"
    labels:
      - "PR Type: Maintenance"
    pull-request-branch-name:
      separator: "-"
    groups:
      version-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gradle"
    directory: "/platforms/android/project"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "01:00"
    labels:
      - "PR Type: Maintenance"
    pull-request-branch-name:
      separator: "-"
    groups:
      version-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/platforms/web/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
    labels:
      - "PR Type: Maintenance"
    pull-request-branch-name:
      separator: "-"
    groups:
      version-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
